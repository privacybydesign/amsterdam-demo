---
services:
  irma:
    image: ghcr.io/privacybydesign/irma:edge
    command: >
      server -v --url ${IRMA_SERVER_URL:-http://localhost:8080} --port 8080 --config /mnt/config/config.json
    restart: unless-stopped
    ports:
      - 8080:8080
    volumes:
      - ./downloads:/schemes:rw
      - ./irma_config.json:/mnt/config/config.json:ro
      - ./.secrets/public.crt:/mnt/requestors/ams-di-demo.crt:ro
    environment:
      IRMASERVER_SCHEMES_PATH: /schemes

  fe:
    container_name: fe
    build:
      context: ./client
      dockerfile: Dockerfile
    volumes:
      - ./client:/usr/src/app

  be:
    container_name: be
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./server:/usr/src/app
    environment:
      - NODE_ENV=development
      - PRIVATE_KEY=${IRMA_PRIVATE_KEY}
      # Frontend dev server (webpack-dev-server), reached over the compose network.
      - FE_URL=http://fe:9000
      # IRMA server API, reached over the compose network by its service name.
      # This is the server-to-server URL; the URL the Yivi app/browser scans is
      # set on the `irma` service's --url flag below.
      - IRMA_SERVER_URL=http://irma:8080

volumes:
  irma-schemes:
